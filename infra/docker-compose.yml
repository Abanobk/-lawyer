services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lawyer
      POSTGRES_USER: lawyer
      POSTGRES_PASSWORD: lawyer
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://lawyer:lawyer@db:5432/lawyer
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  db_data:

