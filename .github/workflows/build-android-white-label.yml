# بناء APK أندرويد (white-label) لمكتب واحد وتسجيل الرابط في الـ API.
# يتطلب Secrets: MOBILE_BUILD_WEBHOOK_TOKEN (نفس قيمة MOBILE_BUILD_WEBHOOK_TOKEN في خادم FastAPI)
# تشغيل يدوي: Actions → هذا الملف → Run workflow
name: Build Android white-label APK

on:
  workflow_dispatch:
    inputs:
      office_code:
        description: (اختياري) لو عايز تبني لمكتب واحد فقط اكتب رمزه. لو فاضي هيبني لكل المكاتب النشطة.
        required: false
        type: string
        default: ""
      api_base_url:
        description: عنوان الـ API الكامل لتطبيق أندرويد (مثل https://lawyer.example.com/api)
        required: true
        type: string
      app_label:
        description: (اختياري) اسم الظهور على أندرويد. لو بتبني لكل المكاتب سيُستخدم اسم المكتب من الـ API إن تُرك فارغًا.
        required: false
        type: string
        default: ""
      backend_api_root:
        description: جذر API للباكند (يفضّل https://lawyer.example.com/api). لو حطيت الدومين فقط، الـ workflow هتضيف /api تلقائيًا.
        required: true
        type: string
  schedule:
    # تشغيل تلقائي لبناء APK للمكاتب النشطة (مثلاً كل ساعة)
    - cron: "0 * * * *"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "backend/**"
      - "infra/mobile-build/**"
      - ".github/workflows/build-android-white-label.yml"

concurrency:
  group: build-android-white-label
  cancel-in-progress: false

env:
  # مطلوبة لتشغيل schedule/push (استخدم GitHub → Settings → Secrets and variables → Actions → Variables)
  # مثال:
  #   MOBILE_API_BASE_URL=https://lawyer.easytecheg.net/api
  #   BACKEND_API_ROOT=https://lawyer.easytecheg.net/api
  # ملاحظة: بعض الناس تضعها في Secrets بدل Variables — ندعم الاثنين.
  MOBILE_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL || secrets.MOBILE_API_BASE_URL }}
  BACKEND_API_ROOT: ${{ vars.BACKEND_API_ROOT || secrets.BACKEND_API_ROOT }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Build matrix from offices list
        id: set-matrix
        env:
          BACKEND_API_ROOT: ${{ inputs.backend_api_root || vars.BACKEND_API_ROOT || secrets.BACKEND_API_ROOT }}
          OFFICE_CODE: ${{ inputs.office_code || '' }}
          APP_LABEL: ${{ inputs.app_label || '' }}
          MOBILE_BUILD_WEBHOOK_TOKEN: ${{ secrets.MOBILE_BUILD_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${MOBILE_BUILD_WEBHOOK_TOKEN}" ]]; then
            echo "Missing secret: MOBILE_BUILD_WEBHOOK_TOKEN"
            echo "Add it in GitHub: Settings → Secrets and variables → Actions → New repository secret"
            exit 2
          fi

          normalize_api_root() {
            local raw="$1"
            raw="$(echo "$raw" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' )"
            if [[ -z "$raw" ]]; then
              echo ""
              return 0
            fi
            raw="${raw%/}"
            case "$raw" in
              */api) echo "$raw" ;;
              *) echo "${raw}/api" ;;
            esac
          }

          BACKEND_API_ROOT="$(normalize_api_root "${BACKEND_API_ROOT}")"
          if [[ -z "${BACKEND_API_ROOT}" ]]; then
            echo "BACKEND_API_ROOT is empty."
            echo "For workflow_dispatch: fill backend_api_root."
            echo "For schedule/push: set GitHub repo variable BACKEND_API_ROOT (recommended: https://your-domain/api)."
            exit 5
          fi

          if [[ -n "${OFFICE_CODE}" ]]; then
            label="${APP_LABEL}"
            if [[ -z "$label" ]]; then label="${OFFICE_CODE}"; fi
            echo "matrix={\"include\":[{\"office_code\":\"${OFFICE_CODE}\",\"app_label\":\"${label}\"}]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tmp_body="$(mktemp)"
          tmp_hdrs="$(mktemp)"
          http_code="$(curl -sS \
            -A "GitHubActions/white-label-apk" \
            -H "Accept: application/json" \
            -H "X-Mobile-Build-Token: ${MOBILE_BUILD_WEBHOOK_TOKEN}" \
            -D "$tmp_hdrs" \
            -o "$tmp_body" \
            -w "%{http_code}" \
            --retry 3 --retry-delay 2 --retry-all-errors \
            "${BACKEND_API_ROOT}/internal/offices/active" || true)"

          if [[ "$http_code" != "200" ]]; then
            echo "Failed to fetch offices list. HTTP=$http_code"
            echo "BACKEND_API_ROOT=${BACKEND_API_ROOT}"
            echo ""
            echo "Response headers:"
            sed -n '1,60p' "$tmp_hdrs" || true
            echo ""
            echo "First 400 chars of body:"
            head -c 400 "$tmp_body" || true
            echo ""
            exit 4
          fi

          offices_json="$(cat "$tmp_body")"

          # { include: [ { office_code, app_label }, ... ] }
          if ! echo "$offices_json" | jq -e . >/dev/null 2>&1; then
            echo "Backend response is not JSON. Check BACKEND_API_ROOT and token."
            echo "BACKEND_API_ROOT=${BACKEND_API_ROOT}"
            echo "First 200 chars of response:"
            echo "$offices_json" | head -c 200
            echo ""
            exit 3
          fi

          matrix="$(echo "$offices_json" | jq -c '{include: [ .[] | {office_code: .code, app_label: .name} ] }')"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build APK
        run: |
          set -euo pipefail
          normalize_api_root() {
            local raw="$1"
            raw="$(echo "$raw" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' )"
            if [[ -z "$raw" ]]; then
              echo ""
              return 0
            fi
            raw="${raw%/}"
            case "$raw" in
              */api) echo "$raw" ;;
              *) echo "${raw}/api" ;;
            esac
          }

          API_BASE="$(normalize_api_root "${{ inputs.api_base_url || vars.MOBILE_API_BASE_URL || secrets.MOBILE_API_BASE_URL }}")"
          if [[ -z "${API_BASE}" ]]; then
            echo "api_base_url is empty."
            echo "For workflow_dispatch: fill api_base_url."
            echo "For schedule/push: set GitHub repo variable MOBILE_API_BASE_URL (recommended: https://your-domain/api)."
            exit 5
          fi

          VC=$(( ${{ github.run_number }} * 10 + ${{ github.run_attempt }} ))
          if [[ "$VC" -gt 2100000000 ]]; then
            echo "ANDROID_VERSION_CODE too large for Android: $VC"
            exit 6
          fi
          echo "ANDROID_VERSION_CODE=$VC" >> "$GITHUB_ENV"

          chmod +x infra/mobile-build/build_white_label_apk.sh
          infra/mobile-build/build_white_label_apk.sh \
            "${{ matrix.office_code }}" \
            "${API_BASE}" \
            "${{ matrix.app_label }}" \
            "${VC}"

      - name: Create release and register in backend
        env:
          GH_TOKEN: ${{ github.token }}
          OFFICE_CODE: ${{ matrix.office_code }}
          BACKEND_API_ROOT: ${{ inputs.backend_api_root || vars.BACKEND_API_ROOT || secrets.BACKEND_API_ROOT }}
          MOBILE_BUILD_WEBHOOK_TOKEN: ${{ secrets.MOBILE_BUILD_WEBHOOK_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          normalize_api_root() {
            local raw="$1"
            raw="$(echo "$raw" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' )"
            if [[ -z "$raw" ]]; then
              echo ""
              return 0
            fi
            raw="${raw%/}"
            case "$raw" in
              */api) echo "$raw" ;;
              *) echo "${raw}/api" ;;
            esac
          }

          export BACKEND_API_ROOT="$(normalize_api_root "${BACKEND_API_ROOT}")"
          if [[ -z "${BACKEND_API_ROOT}" ]]; then
            echo "BACKEND_API_ROOT is empty."
            echo "For workflow_dispatch: fill backend_api_root."
            echo "For schedule/push: set GitHub repo variable BACKEND_API_ROOT (recommended: https://your-domain/api)."
            exit 5
          fi

          chmod +x infra/mobile-build/register_github_release_build.sh
          infra/mobile-build/register_github_release_build.sh
