name: Deploy server

on:
  workflow_dispatch:
  # بعد التأكد من الأسرار والوصول للسيرفر:
  # push:
  #   branches: [main]

jobs:
  deploy:
    # هذا الـ job يعمل على Runner داخل السيرفر نفسه (TrueNAS).
    runs-on: self-hosted
    steps:
      - name: Deploy (pull + compose)
        shell: bash
        run: |
          set -euo pipefail
          cd "/mnt/marichia/files/app-data/lawyer/repo"
          git fetch origin main
          git checkout main
          git pull origin main
          cd infra
          docker compose up -d --build
