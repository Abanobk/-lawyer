# نشر على نفس السيرفر (TrueNAS) عبر self-hosted runner.
# النشر: sudo -n /usr/local/sbin/lawyer-gh-deploy.sh — ثبّت مرة واحدة كـ root:
#   bash infra/github-runner/allow-sudo-deploy.sh
# لتثبيت الـ runner: infra/github-runner/setup-durable-service.sh

name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy (pull + compose)
        shell: bash
        run: sudo -n /usr/local/sbin/lawyer-gh-deploy.sh
