# نشر على نفس السيرفر (TrueNAS) عبر self-hosted runner.
# لتثبيت الـ runner كخدمة دائمة وتجاوز noexec على /home انظر:
#   infra/github-runner/setup-durable-service.sh

name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy (pull + compose)
        shell: bash
        run: |
          set -euo pipefail
          cd "/mnt/marichia/files/app-data/lawyer/repo"
          git fetch origin main
          git checkout main
          # يطابق نسخة GitHub حتى لو في تعديلات محلية على السيرفر (مثل docker-compose)
          git reset --hard origin/main
          cd infra
          # يمنع أخطاء «No such container» عند إعادة إنشاء الحاويات بعد تغيّر الـ IDs
          docker compose down --remove-orphans || true
          docker compose up -d --build --remove-orphans
