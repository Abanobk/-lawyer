# نشر على نفس السيرفر (TrueNAS) عبر self-hosted runner.
# الخطوة تعمل بـ sudo لأن githubrunner غالبًا لا يملك cd إلى /mnt/... — شغّل مرة واحدة كـ root:
#   bash infra/github-runner/allow-sudo-deploy.sh
# (بديل: bash infra/github-runner/grant-runner-repo-access.sh)
# لتثبيت الـ runner: infra/github-runner/setup-durable-service.sh

name: Deploy server

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy (pull + compose)
        shell: bash
        run: |
          sudo -n bash -c 'set -euo pipefail
          cd "/mnt/marichia/files/app-data/lawyer/repo"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          cd infra
          docker compose down --remove-orphans || true
          docker compose up -d --build --remove-orphans'
